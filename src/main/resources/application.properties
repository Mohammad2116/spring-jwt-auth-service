spring.application.name=authService

spring.datasource.url=${authService_DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${authService_DB_USERNAME}
spring.datasource.password=${authService_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

security.jwt.secret=${authService_security_jwt_secret}
security.jwt.access-token-expiration=900000
security.jwt.refresh-token-expiration=604800000

spring.data.web.pageable.default-page-size=10
spring.data.web.pageable.max-page-size=50

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
